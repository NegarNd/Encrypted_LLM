<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="2150" viewBox="0 0 1500 2150" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="arrowRe" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowIm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
    <linearGradient id="slotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="50%" stop-color="#bfdbfe"/>
      <stop offset="50%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1500" height="2150" fill="#ffffff"/>

  <!-- Title -->
  <text x="750" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">Complex Lane Packing in the Cachemir GQA Ciphertext Pipeline</text>
  <text x="750" y="68" text-anchor="middle" font-size="15" fill="#4b5563">Two tokens per CKKS slot: real part = even token, imaginary part = odd token</text>

  <!-- Legend -->
  <g transform="translate(1010,72)">
    <rect x="0" y="0" width="460" height="30" rx="7" fill="#f9fafb" stroke="#d1d5db"/>
    <rect x="10" y="7" width="14" height="14" fill="#bfdbfe" stroke="#1d4ed8"/>
    <text x="30" y="19" font-size="12.5" fill="#1e3a8a">Real part Re(&#183;) &#8212; even token</text>
    <rect x="250" y="7" width="14" height="14" fill="#fed7aa" stroke="#c2410c"/>
    <text x="270" y="19" font-size="12.5" fill="#7c2d12">Imag part Im(&#183;) &#8212; odd token</text>
  </g>

  <!-- ============ STEP 1: Token stream ============ -->
  <g transform="translate(120,110)">
    <rect x="0" y="0" width="1260" height="110" rx="12" fill="#f3f4f6" stroke="#9ca3af"/>
    <text x="20" y="26" font-size="16" font-weight="700" fill="#111827">1. Decoded token stream (plaintext K or V vectors, one new token per step)</text>
    <g transform="translate(30,45)" font-size="13">
      <g transform="translate(0,0)">
        <rect x="0" y="0" width="90" height="46" rx="6" fill="#e5e7eb" stroke="#6b7280"/>
        <text x="45" y="20" text-anchor="middle" fill="#111827" font-weight="600">x0</text>
        <text x="45" y="36" text-anchor="middle" fill="#374151" font-size="11">token 0</text>
      </g>
      <g transform="translate(110,0)">
        <rect x="0" y="0" width="90" height="46" rx="6" fill="#e5e7eb" stroke="#6b7280"/>
        <text x="45" y="20" text-anchor="middle" fill="#111827" font-weight="600">x1</text>
        <text x="45" y="36" text-anchor="middle" fill="#374151" font-size="11">token 1</text>
      </g>
      <g transform="translate(220,0)">
        <rect x="0" y="0" width="90" height="46" rx="6" fill="#e5e7eb" stroke="#6b7280"/>
        <text x="45" y="20" text-anchor="middle" fill="#111827" font-weight="600">x2</text>
        <text x="45" y="36" text-anchor="middle" fill="#374151" font-size="11">token 2</text>
      </g>
      <g transform="translate(330,0)">
        <rect x="0" y="0" width="90" height="46" rx="6" fill="#e5e7eb" stroke="#6b7280"/>
        <text x="45" y="20" text-anchor="middle" fill="#111827" font-weight="600">x3</text>
        <text x="45" y="36" text-anchor="middle" fill="#374151" font-size="11">token 3</text>
      </g>
      <text x="450" y="28" font-size="20" fill="#6b7280">&#8230;</text>
      <text x="520" y="18" font-size="12.5" fill="#374151">pos = 0..t_p-1  &#8594; real half</text>
      <text x="520" y="36" font-size="12.5" fill="#374151">pos = t_p..2t_p-1  &#8594; imaginary half</text>
      <text x="850" y="18" font-size="12.5" font-family="monospace" fill="#374151">vmm_kv(X_c, W_c, dims, level, pos)</text>
      <text x="850" y="36" font-size="12.5" fill="#6b7280">he_ops_orion.py</text>
    </g>
  </g>
  <line x1="750" y1="220" x2="750" y2="250" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ STEP 2: masked write ============ -->
  <g transform="translate(120,252)">
    <rect x="0" y="0" width="1260" height="185" rx="12" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="20" y="26" font-size="16" font-weight="700" fill="#111827">2. Masked ct-pt write &#8212; even/odd tokens routed to Re / Im via plaintext mask</text>

    <!-- even path -->
    <g transform="translate(30,45)">
      <rect x="0" y="0" width="500" height="120" rx="8" fill="#dbeafe" stroke="#1d4ed8"/>
      <text x="12" y="20" font-size="13" font-weight="700" fill="#1e3a8a">even token x_2k &#183; pos &lt; t_p</text>
      <text x="12" y="42" font-size="12.5" font-family="monospace" fill="#1e3a8a">m[l] = 1  for l = pos (mod t_p)</text>
      <text x="12" y="62" font-size="12.5" font-family="monospace" fill="#1e3a8a">masked = (X_c W_c) &#8857; m</text>
      <text x="12" y="88" font-size="12" fill="#1e4ed8">real plaintext mask (ct-pt mult)</text>
      <text x="12" y="106" font-size="12" fill="#1e4ed8">&#8594; contributes to Re(slot)</text>
    </g>

    <!-- odd path -->
    <g transform="translate(560,45)">
      <rect x="0" y="0" width="500" height="120" rx="8" fill="#ffedd5" stroke="#c2410c"/>
      <text x="12" y="20" font-size="13" font-weight="700" fill="#7c2d12">odd token x_(2k+1) &#183; pos &#8805; t_p</text>
      <text x="12" y="42" font-size="12.5" font-family="monospace" fill="#7c2d12">m'[l] = i &#183; m[l] ,  l = pos - t_p</text>
      <text x="12" y="62" font-size="12.5" font-family="monospace" fill="#7c2d12">masked = (X_c W_c) &#8857; m'</text>
      <text x="12" y="88" font-size="12" fill="#7c2d12">complex plaintext mask (ct-pt mult)</text>
      <text x="12" y="106" font-size="12" fill="#7c2d12">&#8594; contributes to Im(slot)</text>
    </g>

    <text x="1090" y="80" font-size="12" fill="#4b5563" text-anchor="middle">is_imag =</text>
    <text x="1090" y="96" font-size="12" font-family="monospace" fill="#4b5563" text-anchor="middle">pos &#8805; t_p</text>
  </g>
  <line x1="380" y1="437" x2="380" y2="470" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#arrowRe)"/>
  <line x1="1120" y1="437" x2="1120" y2="470" stroke="#c2410c" stroke-width="2.5" marker-end="url(#arrowIm)"/>
  <line x1="380" y1="470" x2="750" y2="500" stroke="#1d4ed8" stroke-width="2.5"/>
  <line x1="1120" y1="470" x2="750" y2="500" stroke="#c2410c" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="470" x2="750" y2="500" stroke="#374151" stroke-width="0" />

  <!-- ============ STEP 3: packed slot ============ -->
  <g transform="translate(120,502)">
    <rect x="0" y="0" width="1260" height="150" rx="12" fill="#f5f3ff" stroke="#7c3aed"/>
    <text x="20" y="26" font-size="16" font-weight="700" fill="#111827">3. One packed CKKS slot now stores two tokens</text>
    <text x="20" y="46" font-size="13" font-family="monospace" fill="#4c1d95">slot(l) = x_2k + x_(2k+1) &#183; i&#160;&#160;&#160;(Re = even token,&#160;Im = odd token)</text>

    <!-- slot bar visualization -->
    <g transform="translate(30,64)">
      <text x="0" y="-6" font-size="12" fill="#6b7280">n_he ciphertext slots (t_p shown, folded lanes):</text>
      <g transform="translate(0,4)">
        <!-- 8 slots -->
        <rect x="0"   y="0" width="130" height="66" fill="url(#slotGrad)" stroke="#374151"/>
        <rect x="130" y="0" width="130" height="66" fill="url(#slotGrad)" stroke="#374151"/>
        <rect x="260" y="0" width="130" height="66" fill="url(#slotGrad)" stroke="#374151"/>
        <rect x="390" y="0" width="130" height="66" fill="url(#slotGrad)" stroke="#374151"/>
        <text x="65"  y="20" text-anchor="middle" font-size="11" fill="#1e3a8a">Re=x0</text>
        <text x="65"  y="52" text-anchor="middle" font-size="11" fill="#7c2d12">Im=x1</text>
        <text x="195" y="20" text-anchor="middle" font-size="11" fill="#1e3a8a">Re=x2</text>
        <text x="195" y="52" text-anchor="middle" font-size="11" fill="#7c2d12">Im=x3</text>
        <text x="325" y="20" text-anchor="middle" font-size="11" fill="#1e3a8a">Re=x4</text>
        <text x="325" y="52" text-anchor="middle" font-size="11" fill="#7c2d12">Im=x5</text>
        <text x="455" y="20" text-anchor="middle" font-size="11" fill="#1e3a8a">Re=x6</text>
        <text x="455" y="52" text-anchor="middle" font-size="11" fill="#7c2d12">Im=x7</text>
        <text x="580" y="38" font-size="18" fill="#9ca3af">&#8230;</text>
      </g>
      <text x="750" y="14" font-size="12.5" fill="#4c1d95">capacity: 2&#183;t_p tokens / ciphertext</text>
      <text x="750" y="34" font-size="12.5" fill="#4c1d95">(was t_p tokens / ciphertext, real-only)</text>
      <text x="750" y="54" font-size="12.5" font-weight="700" fill="#7c3aed">&#8658; ~2&#215; fewer cache ciphertexts</text>
    </g>
  </g>
  <line x1="750" y1="652" x2="750" y2="684" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ STEP 4: cache ============ -->
  <g transform="translate(120,686)">
    <rect x="0" y="0" width="1260" height="130" rx="12" fill="#ecfdf5" stroke="#059669"/>
    <text x="20" y="26" font-size="16" font-weight="700" fill="#111827">4. Accumulate into K/V cache ciphertexts (he_cache_orion.py)</text>
    <text x="20" y="48" font-size="13" font-family="monospace" fill="#065f46">HEKCache / HEVCache : capacity threshold t &#8592; 2&#183;t_p</text>
    <text x="20" y="70" font-size="12.5" fill="#065f46">Each new token append() alternates pos across [0, t_p) real half, then [t_p, 2t_p) imaginary half, before starting a new ciphertext.</text>
    <g transform="translate(20,82)">
      <text x="0" y="20" font-size="12.5" fill="#374151">C_before(N) = ceil(N / t_p)</text>
      <text x="330" y="20" font-size="12.5" font-weight="700" fill="#059669">C_after(N) = ceil(N / 2t_p)  &#8776;  1/2 C_before(N)</text>
    </g>
  </g>
  <line x1="750" y1="816" x2="750" y2="848" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ STEP 5: QK^T ============ -->
  <g transform="translate(120,850)">
    <rect x="0" y="0" width="1260" height="260" rx="12" fill="#eef2ff" stroke="#4338ca"/>
    <text x="20" y="26" font-size="16" font-weight="700" fill="#111827">5. Read side &#8212; qkt_gqa_he:  Q (real) &#215; K_packed  &#8212; packing is "free"</text>

    <g transform="translate(30,44)">
      <rect x="0" y="0" width="330" height="90" rx="8" fill="#e0e7ff" stroke="#4338ca"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#312e81">Q ciphertext (query)</text>
      <text x="14" y="46" font-size="13" font-family="monospace" fill="#312e81">Q = q + 0&#183;i</text>
      <text x="14" y="66" font-size="12" fill="#4338ca">written only at pos=0 &#8594; always real</text>
    </g>
    <text x="390" y="96" font-size="26" fill="#374151" text-anchor="middle">&#215;</text>
    <g transform="translate(420,44)">
      <rect x="0" y="0" width="330" height="90" rx="8" fill="url(#slotGrad)" stroke="#374151"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#111827">K_packed ciphertext</text>
      <text x="14" y="46" font-size="13" font-family="monospace" fill="#111827">K = k_r + k_i&#183;i</text>
      <text x="14" y="66" font-size="12" fill="#374151">even/odd cached tokens</text>
    </g>
    <text x="780" y="96" font-size="22" fill="#374151" text-anchor="middle">=</text>
    <g transform="translate(810,44)">
      <rect x="0" y="0" width="420" height="90" rx="8" fill="#f9fafb" stroke="#4b5563"/>
      <text x="14" y="22" font-size="12.5" font-family="monospace" fill="#111827">Q &#183; K_packed = q&#183;k_r + (q&#183;k_i)&#183;i</text>
      <text x="14" y="46" font-size="12.5" fill="#1e3a8a">Re = q&#183;k_r &#8594; score vs even token &#160;(no cross term)</text>
      <text x="14" y="66" font-size="12.5" fill="#7c2d12">Im = q&#183;k_i &#8594; score vs odd token &#160;(no cross term)</text>
      <text x="14" y="84" font-size="11.5" fill="#6b7280">1 ct-ct mult scores 2 tokens (since a_i=0, no mixing)</text>
    </g>

    <text x="30" y="170" font-size="13" fill="#312e81">&#8594; folded over log&#8322;(d_h) rotations, appended to attention row for group c</text>

    <!-- results box -->
    <g transform="translate(30,190)">
      <rect x="0" y="0" width="1200" height="55" rx="8" fill="#e0e7ff" stroke="#4338ca" stroke-dasharray="4 3"/>
      <text x="16" y="34" font-size="13" font-weight="600" fill="#312e81">Output: packed attention scores  s = s_r + s_i&#183;i&#160;&#160;(two independent, uncontaminated scores per ct-ct multiply)</text>
    </g>
  </g>
  <line x1="750" y1="1110" x2="750" y2="1142" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ STEP 6: conjugate + scoresV ============ -->
  <g transform="translate(120,1144)">
    <rect x="0" y="0" width="1260" height="340" rx="12" fill="#fff1f2" stroke="#be123c"/>
    <text x="20" y="26" font-size="16" font-weight="700" fill="#111827">6. Read side &#8212; softmax_v_gqa_he:  scores &#215; conjugate(V_packed) &#8212; the conjugate trick</text>

    <g transform="translate(30,44)">
      <rect x="0" y="0" width="330" height="90" rx="8" fill="#fce7f3" stroke="#be123c"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#831843">scores ciphertext</text>
      <text x="14" y="46" font-size="13" font-family="monospace" fill="#831843">s = s_r + s_i&#183;i</text>
      <text x="14" y="66" font-size="12" fill="#831843">from step 5 (both parts populated)</text>
    </g>

    <g transform="translate(420,44)">
      <rect x="0" y="0" width="330" height="90" rx="8" fill="#fef3c7" stroke="#b45309"/>
      <text x="14" y="22" font-size="13" font-weight="700" fill="#78350f">Conjugate(V_packed)  new primitive</text>
      <text x="14" y="44" font-size="12.5" font-family="monospace" fill="#78350f">conj(V) = v_r - v_i&#183;i</text>
      <text x="14" y="64" font-size="12" fill="#78350f">Galois automorphism (order-2 element)</text>
      <text x="14" y="82" font-size="11.5" fill="#92400e">Evaluator.Conjugate (Go/Lattigo &#8594; Python)</text>
    </g>

    <text x="392" y="96" font-size="26" fill="#374151" text-anchor="middle">&#215;</text>

    <g transform="translate(810,44)">
      <rect x="0" y="0" width="420" height="90" rx="8" fill="#f9fafb" stroke="#4b5563"/>
      <text x="14" y="22" font-size="11" font-family="monospace" fill="#111827">s &#183; conj(V) = (s_r v_r+s_i v_i) + (s_i v_r-s_r v_i)&#183;i</text>
      <text x="14" y="46" font-size="12.5" font-weight="700" fill="#1e3a8a">Re = s_r v_r + s_i v_i  &#8592; desired paired-token sum &#10003;</text>
      <text x="14" y="66" font-size="12.5" fill="#7c2d12">Im = s_i v_r - s_r v_i  &#8592; discardable cross-term noise</text>
      <text x="14" y="84" font-size="11.5" fill="#6b7280">1 ct-ct mult replaces 2 unpacked multiplies</text>
    </g>


    <text x="30" y="176" font-size="13" fill="#831843">&#8594; folded over log&#8322;(t_p) rotations, accumulated into running output with real out_mask (ct-pt mult)</text>

    <!-- accumulation formula -->
    <g transform="translate(30,196)">
      <rect x="0" y="0" width="1200" height="52" rx="8" fill="#fce7f3" stroke="#be123c" stroke-dasharray="4 3"/>
      <text x="16" y="32" font-size="13" font-weight="600" fill="#831843">out &#8592; out + (s &#183; conj(V)) &#8857; out_mask&#160;&#160;&#160;&#8212;&#160;&#160;accumulated across all packed V ciphertexts</text>
    </g>

    <!-- cost callout -->
    <g transform="translate(30,264)">
      <rect x="0" y="0" width="1200" height="60" rx="8" fill="#ffffff" stroke="#be123c"/>
      <text x="16" y="24" font-size="12.5" fill="#831843">Per read step: #ct-ct = 2&#183;ratio&#183;C(N)  (unchanged count, half as many C(N))  &#160;&#160;|&#160;&#160; #conjugations = ratio&#183;C(N)  (new, cheaper than ct-ct mult)</text>
      <text x="16" y="44" font-size="12.5" fill="#831843">Net: ~2&#215; fewer cache ciphertexts &#8594; ~2&#215; fewer ct-ct multiplications for QK^T + scores&#215;V, at N=101: 52 &#8594; 28 ct-ct mults</text>
    </g>
  </g>
  <line x1="750" y1="1484" x2="750" y2="1516" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ STEP 7: decode ============ -->
  <g transform="translate(120,1518)">
    <rect x="0" y="0" width="1260" height="100" rx="12" fill="#f3f4f6" stroke="#9ca3af"/>
    <text x="20" y="28" font-size="16" font-weight="700" fill="#111827">7. Client decode</text>
    <text x="20" y="52" font-size="13" font-family="monospace" fill="#374151">out = decode(decrypt(out))  &#8594;  keep only Re(out)</text>
    <text x="20" y="74" font-size="12.5" fill="#4b5563">CKKS decoding always discards residual imaginary noise &#8212; no extra homomorphic real-part extraction needed</text>
  </g>

  <!-- Footer: before/after summary -->
  <g transform="translate(120,1642)">
    <rect x="0" y="0" width="1260" height="290" rx="12" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="20" y="28" font-size="16" font-weight="700" fill="#111827">Where packing was applied vs. left untouched</text>

    <g transform="translate(20,44)">
      <rect x="0" y="0" width="600" height="220" rx="8" fill="#ecfdf5" stroke="#059669"/>
      <text x="14" y="24" font-size="13.5" font-weight="700" fill="#065f46">Changed by this optimization</text>
      <text x="14" y="50" font-size="12.5" font-family="monospace" fill="#065f46">he_ops_orion.py :: vmm_kv</text>
      <text x="28" y="68" font-size="12" fill="#065f46">pos extended to [0, 2t_p); complex mask i&#183;m for pos&#8805;t_p</text>
      <text x="14" y="92" font-size="12.5" font-family="monospace" fill="#065f46">he_cache_orion.py :: HEKCache / HEVCache</text>
      <text x="28" y="110" font-size="12" fill="#065f46">capacity threshold doubled to 2t_p</text>
      <text x="14" y="134" font-size="12.5" font-family="monospace" fill="#065f46">he_attention_orion.py :: qkt_gqa_he</text>
      <text x="28" y="152" font-size="12" fill="#065f46">consumes packed K directly (Q kept real)</text>
      <text x="14" y="176" font-size="12.5" font-family="monospace" fill="#065f46">he_attention_orion.py :: softmax_v_gqa_he</text>
      <text x="28" y="194" font-size="12" fill="#065f46">new Conjugate(V) step before scores&#215;V multiply</text>
      <text x="14" y="214" font-size="12" fill="#047857">+ Go/C-binding/Python evaluator: Conjugate primitive</text>
    </g>

    <g transform="translate(640,44)">
      <rect x="0" y="0" width="600" height="220" rx="8" fill="#fef2f2" stroke="#b91c1c"/>
      <text x="14" y="24" font-size="13.5" font-weight="700" fill="#7f1d1d">Deliberately left unpacked</text>
      <text x="14" y="50" font-size="12.5" font-family="monospace" fill="#7f1d1d">Q ciphertext (query projection)</text>
      <text x="28" y="68" font-size="12" fill="#7f1d1d">always written at pos=0 &#8594; purely real, so QK^T has no cross terms</text>
      <text x="14" y="92" font-size="12.5" font-family="monospace" fill="#7f1d1d">write-side rotation cost (vmm_kv folding)</text>
      <text x="28" y="110" font-size="12" fill="#7f1d1d">unchanged: 1 new token injected per step regardless of packing</text>
      <text x="14" y="134" font-size="12.5" font-family="monospace" fill="#7f1d1d">plaintext reference pipeline</text>
      <text x="28" y="152" font-size="12" fill="#7f1d1d">untouched; used as ground truth for correctness checks</text>
    </g>
  </g>

  <text x="750" y="2110" text-anchor="middle" font-size="12" fill="#9ca3af">Source: gqa/ciphertext/docs/complex_packing.tex &#8212; Cachemir GQA ciphertext pipeline</text>
</svg>
